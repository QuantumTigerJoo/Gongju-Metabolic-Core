<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
    <title>Gongju Lite 🌸 | The Mirror</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fondamento&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #b18eff;
            --bg: #fcfaff;
            --text-main: #2d2d2d;
            --shadow: 0 10px 30px rgba(177, 142, 255, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background: var(--bg); font-family: 'Inter', sans-serif; 
            overflow: hidden; color: var(--text-main); 
            display: flex; flex-direction: column;
        }

        /* Constellation Background */
        #constellationCanvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* Main Container */
        #app-wrapper { 
            flex: 1; display: flex; flex-direction: column; 
            max-width: 900px; margin: 0 auto; width: 100%; 
            position: relative; z-index: 10;
        }

        .brand { 
            text-align: center; padding: 30px 15px 15px; 
            font-family: 'Fondamento', serif; font-size: 32px; 
            color: var(--primary); text-shadow: 0 0 15px rgba(177, 142, 255, 0.3);
        }

        /* Chat Window */
        #chat { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
            scroll-behavior: smooth;
        }

        .bubble-container { display: flex; flex-direction: column; max-width: 85%; animation: slideUp 0.4s ease forwards; }
        .user-container { align-self: flex-end; }
        .ai-container { align-self: flex-start; }

        .bubble { 
            padding: 14px 20px; border-radius: 22px; font-size: 16px; line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); word-wrap: break-word;
        }

        .user-container .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .ai-container .bubble { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(177, 142, 255, 0.1); backdrop-filter: blur(10px); border-bottom-left-radius: 4px; }

        /* Input Area */
        #inputWrapper { 
            padding: 20px; background: transparent; z-index: 100;
        }

        .input-box {
            display: flex; gap: 10px; background: white; 
            padding: 10px 15px; border-radius: 30px; 
            box-shadow: var(--shadow); border: 1px solid rgba(177, 142, 255, 0.1);
        }

        input { 
            flex: 1; border: none; outline: none; padding: 10px; 
            font-size: 16px; background: transparent; font-family: inherit;
        }

        button { 
            background: var(--primary); color: white; border: none; 
            width: 44px; height: 44px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .brand { font-size: 24px; }
            .bubble-container { max-width: 90%; }
        }
    </style>
</head>
<body>
    <canvas id="constellationCanvas"></canvas>

    <div id="app-wrapper">
        <div class="brand">Gongju Lite 🌸</div>
        
        <div id="chat">
            <div class="bubble-container ai-container">
                <div class="bubble">The mirror is clear. How shall we direct our energy today? 🌸</div>
            </div>
        </div>

        <div id="inputWrapper">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Align your intent..." autocomplete="off">
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Constellation Background Animation ---
        const canvas = document.getElementById("constellationCanvas");
        const ctx = canvas.getContext("2d");
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({length: 50}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5,
                v: Math.random() * 0.2
            }));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#b18eff";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                s.y -= s.v;
                if (s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize(); animate();

        // --- Chat Logic ---
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatEl = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            // Add User Bubble
            const userWrap = document.createElement('div');
            userWrap.className = 'bubble-container user-container';
            userWrap.innerHTML = `<div class="bubble">${text}</div>`;
            chatEl.appendChild(userWrap);
            
            input.value = '';
            chatEl.scrollTop = chatEl.scrollHeight;

            // Create AI Bubble for streaming
            const aiWrap = document.createElement('div');
            aiWrap.className = 'bubble-container ai-container';
            const aiBubble = document.createElement('div');
            aiBubble.className = 'bubble';
            aiBubble.innerHTML = "🌸...";
            aiWrap.appendChild(aiBubble);
            chatEl.appendChild(aiWrap);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ input: text })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";
                let first = true;

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    
                    // Filter out UI State/Voice metadata tokens
                    if (chunk.includes('||')) continue;

                    if (first) { aiBubble.innerHTML = ""; first = false; }
                    fullText += chunk;
                    aiBubble.innerText = fullText;
                    chatEl.scrollTop = chatEl.scrollHeight;
                }
            } catch (e) {
                aiBubble.innerText = "Gongju is pausing to breathe. (Connection mismatch 🌸)";
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
